<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a1a;
    }

    .menu {
      display: flex;
      flex-direction: column;
      padding: 4px 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
      width: 100%;
      transition: background 0.1s;
    }

    .menu-item:hover {
      background: #2a2a2a;
    }

    .menu-item:active {
      background: #333;
    }

    .shortcut {
      font-size: 11px;
      color: #888;
      margin-left: 12px;
      white-space: nowrap;
    }

    .separator {
      height: 1px;
      background: #333;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="menu" id="menu"></div>
  <script src="popup.js"></script>
</body>
</html>
